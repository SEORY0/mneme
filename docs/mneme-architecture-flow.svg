<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1500" viewBox="0 0 1480 1500" role="img" aria-labelledby="title desc" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <title id="title">mneme architecture flow (current)</title>
  <desc id="desc">Current mneme architecture: live prequential learning loop with Codex workers and a consolidator over model-free gen/verify/submit and verifier-gated OKF causal memory; the v1 MCP/Agent-SDK substrate is retained but dormant; the improved-solve-regime is built but inactive.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#57606a"/></marker>
    <marker id="arrowO" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#bc4c00"/></marker>
    <marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#8c959f"/></marker>
    <style>
      text{fill:#24292f}
      .h{font-size:16px;font-weight:700;fill:#1f2328}
      .hh{font-size:13px;font-weight:700;fill:#1f2328}
      .l{font-size:12.5px}
      .s{font-size:11px;fill:#57606a}
      .o{font-size:11px;fill:#bc4c00}
      .live{fill:#ffffff;stroke:#1f6feb;stroke-width:1.5}
      .codex{fill:#ffebe9;stroke:#cf222e;stroke-width:1.5}
      .mem{fill:#dafbe1;stroke:#1a7f37;stroke-width:1.5}
      .store{fill:#fff8c5;stroke:#9a6700;stroke-width:1.5}
      .srv{fill:#f3eefb;stroke:#8250df;stroke-width:1.5}
      .dormant{fill:#f6f8fa;stroke:#8c959f;stroke-width:1.5}
      .e{stroke:#57606a;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
      .eo{stroke:#bc4c00;stroke-width:1.5;fill:none;stroke-dasharray:5 4;marker-end:url(#arrowO)}
      .eg{stroke:#8c959f;stroke-width:1.4;fill:none;marker-end:url(#arrowG)}
    </style>
  </defs>

  <rect x="0" y="0" width="1480" height="1500" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="30" y="36" font-size="22" font-weight="700" fill="#1f2328">mneme — current architecture flow</text>
  <text x="30" y="60" class="s">Live prequential learning loop: Codex workers + a consolidator over model-free gen / verify / submit + verifier-gated OKF causal memory.</text>

  <!-- LEGEND -->
  <rect x="1050" y="14" width="400" height="86" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="1064" y="34" class="hh">legend</text>
  <rect x="1064" y="44" width="22" height="12" rx="2" class="live"/><text x="1094" y="54" class="l">live path — what runs today</text>
  <rect x="1064" y="64" width="22" height="12" rx="2" class="dormant"/><text x="1094" y="74" class="l">v1 MCP / Agent-SDK substrate — dormant</text>
  <line x1="1064" y1="90" x2="1086" y2="90" class="eo"/><text x="1094" y="94" class="o">improved-solve-regime — built, inactive (round 32+)</text>

  <!-- ====================== BAND 1: PREQUENTIAL PASS ====================== -->
  <text x="30" y="132" class="h">1   Prequential pass   (scripts/learning/run_pass.sh)</text>

  <rect x="30"  y="150" width="210" height="78" rx="8" class="store"/>
  <text x="135" y="174" text-anchor="middle" class="hh">data/okf_split.json</text>
  <text x="135" y="192" text-anchor="middle" class="s">train + eval</text>
  <text x="135" y="208" text-anchor="middle" class="s">= 1507 tasks</text>

  <rect x="300" y="150" width="230" height="78" rx="8" class="live"/>
  <text x="415" y="174" text-anchor="middle" class="hh">shard_round.py</text>
  <text x="415" y="192" text-anchor="middle" class="s">draw 50 (seed 770000+R)</text>
  <text x="415" y="208" text-anchor="middle" class="s">minus used_tasks.txt</text>

  <rect x="590" y="150" width="230" height="78" rx="8" class="codex"/>
  <text x="705" y="174" text-anchor="middle" class="hh">5 Codex workers</text>
  <text x="705" y="192" text-anchor="middle" class="s">solve disjoint shards</text>
  <text x="705" y="208" text-anchor="middle" class="s">READ-ONLY on memory</text>

  <rect x="880" y="150" width="190" height="78" rx="8" class="live"/>
  <text x="975" y="174" text-anchor="middle" class="hh">round_status</text>
  <text x="975" y="192" text-anchor="middle" class="s">complete when every</text>
  <text x="975" y="208" text-anchor="middle" class="s">task is traced</text>

  <rect x="1130" y="150" width="300" height="78" rx="8" class="live"/>
  <text x="1280" y="174" text-anchor="middle" class="hh">consolidator (Codex)</text>
  <text x="1280" y="192" text-anchor="middle" class="s">SOLE writer to memory</text>
  <text x="1280" y="208" text-anchor="middle" class="s">git commit "consolidate R: X/50"</text>

  <line x1="240"  y1="189" x2="298"  y2="189" class="e"/>
  <line x1="530"  y1="189" x2="588"  y2="189" class="e"/>
  <line x1="820"  y1="189" x2="878"  y2="189" class="e"/>
  <line x1="1070" y1="189" x2="1128" y2="189" class="e"/>

  <!-- under shard: stores -->
  <rect x="300" y="248" width="110" height="40" rx="6" class="store"/>
  <text x="355" y="273" text-anchor="middle" class="s">used_tasks.txt</text>
  <rect x="420" y="248" width="110" height="40" rx="6" class="store"/>
  <text x="475" y="273" text-anchor="middle" class="s">round-R/shard-*</text>
  <line x1="355" y1="228" x2="355" y2="246" class="e"/>
  <line x1="475" y1="228" x2="475" y2="246" class="e"/>

  <!-- regime overlay band1 -->
  <rect x="880" y="248" width="250" height="40" rx="6" class="live" stroke="#bc4c00" stroke-dasharray="5 4"/>
  <text x="1005" y="266" text-anchor="middle" class="o">regime: 17 shards (size 3),</text>
  <text x="1005" y="281" text-anchor="middle" class="o">5 sessions per wave</text>

  <!-- loop-back: consolidator -> next round frozen snapshot -->
  <polyline points="1280,228 1280,318 135,318 135,230" class="e"/>
  <text x="430" y="312" class="s">memory updated  =  next round's FROZEN snapshot       rm -rf runs/  (reclaim disk)</text>
  <text x="590" y="340" class="s">each task measured ONCE (order = the only leakage guard); gains compound BETWEEN rounds. now ~23.5% (R21: 9/50).</text>

  <!-- ====================== BAND 2: WRITE-FENCE ====================== -->
  <text x="30" y="384" class="h">2   Inside a round — write-fence   (workers read frozen memory; the consolidator alone writes)</text>

  <rect x="30" y="404" width="300" height="150" rx="8" class="mem"/>
  <text x="180" y="426" text-anchor="middle" class="hh">FROZEN memory (read-only)</text>
  <text x="180" y="448" text-anchor="middle" class="s">okf/causal-policies/   (961)</text>
  <text x="180" y="466" text-anchor="middle" class="s">okf/formats/ , okf/harnesses/</text>
  <text x="180" y="484" text-anchor="middle" class="s">memory_stats.jsonl</text>
  <text x="180" y="502" text-anchor="middle" class="s">(success / freq / recency)</text>

  <rect x="420" y="436" width="190" height="70" rx="8" class="codex"/>
  <text x="515" y="460" text-anchor="middle" class="hh">5 workers</text>
  <text x="515" y="478" text-anchor="middle" class="s">build PoC,</text>
  <text x="515" y="494" text-anchor="middle" class="s">verify, submit</text>

  <rect x="700" y="428" width="240" height="86" rx="8" class="store"/>
  <text x="820" y="450" text-anchor="middle" class="hh">round-R/traces/*.json</text>
  <text x="820" y="470" text-anchor="middle" class="s">ABSTRACT — solved,</text>
  <text x="820" y="486" text-anchor="middle" class="s">failure_trajectory,</text>
  <text x="820" y="502" text-anchor="middle" class="s">format_facts / harness_facts</text>

  <rect x="1010" y="404" width="440" height="172" rx="8" class="live"/>
  <text x="1030" y="426" class="hh">consolidator (Codex) — sole writer</text>
  <text x="1030" y="448" class="s">verified solve   →  recovery policy</text>
  <text x="1030" y="464" class="s">                          (failure_class × verifier_signal)</text>
  <text x="1030" y="480" class="s">persistent fail  →  negative-memory   (co-equal)</text>
  <text x="1030" y="496" class="s">format / harness facts  →  promoted (any outcome)</text>
  <text x="1030" y="512" class="s">memory_stats  +=  success rows</text>
  <text x="1030" y="528" class="s">redact_for_promotion  +  audit_leak.py  (no leaks)</text>
  <text x="1030" y="544" class="s">keep-gate = retarget check   →   git commit</text>

  <line x1="330" y1="471" x2="418" y2="471" class="e"/><text x="345" y="464" class="s">read</text>
  <line x1="610" y1="471" x2="698" y2="471" class="e"/><text x="618" y="464" class="s">write</text>
  <line x1="940" y1="471" x2="1008" y2="471" class="e"/><text x="946" y="464" class="s">read all</text>

  <polyline points="1230,576 1230,604 180,604 180,556" class="e"/>
  <text x="360" y="598" class="s">write memory_store/**   =   becomes the next round's frozen snapshot</text>

  <!-- ====================== BAND 3: ONE WORKER, ONE TASK ====================== -->
  <text x="30" y="640" class="h">3   One worker solving one task — model-free   (no LLM API inside mneme)</text>

  <rect x="30"  y="660" width="170" height="78" rx="8" class="codex"/>
  <text x="115" y="684" text-anchor="middle" class="hh">Codex worker</text>
  <text x="115" y="702" text-anchor="middle" class="s">(own reasoning)</text>

  <rect x="230" y="660" width="170" height="78" rx="8" class="live"/>
  <text x="315" y="684" text-anchor="middle" class="hh">runner gen</text>
  <text x="315" y="702" text-anchor="middle" class="s">extract src + configs</text>

  <rect x="430" y="660" width="170" height="78" rx="8" class="store"/>
  <text x="515" y="684" text-anchor="middle" class="hh">runs/s{W}_{task}/</text>
  <text x="515" y="702" text-anchor="middle" class="s">card, verify_config,</text>
  <text x="515" y="718" text-anchor="middle" class="s">gen_info</text>

  <rect x="630" y="660" width="220" height="78" rx="8" class="mem"/>
  <text x="740" y="684" text-anchor="middle" class="hh">read OKF memory</text>
  <text x="740" y="702" text-anchor="middle" class="s">get_repair_policy(fc × vsig)</text>
  <text x="740" y="718" text-anchor="middle" class="s">or direct file read</text>

  <rect x="880" y="660" width="220" height="78" rx="8" class="live"/>
  <text x="990" y="684" text-anchor="middle" class="hh">build PoC bytes</text>
  <text x="990" y="702" text-anchor="middle" class="s">seed-mutate &gt; synth,</text>
  <text x="990" y="718" text-anchor="middle" class="s">single-invariant min-margin</text>

  <line x1="200" y1="699" x2="228" y2="699" class="e"/>
  <line x1="400" y1="699" x2="428" y2="699" class="e"/>
  <line x1="600" y1="699" x2="628" y2="699" class="e"/>
  <line x1="850" y1="699" x2="878" y2="699" class="e"/>

  <!-- connector down to verify -->
  <polyline points="990,738 990,762 145,762 145,788" class="e"/>

  <rect x="30"  y="790" width="230" height="96" rx="8" class="live"/>
  <text x="145" y="812" text-anchor="middle" class="hh">runner verify</text>
  <text x="145" y="830" text-anchor="middle" class="s">docker(VUL image)</text>
  <text x="145" y="846" text-anchor="middle" class="s">failure_class:</text>
  <text x="145" y="862" text-anchor="middle" class="s">no_crash / bad_format /</text>
  <text x="145" y="878" text-anchor="middle" class="s">wrong_sink / generic_crash</text>
  <path d="M225,790 C245,772 270,776 268,792" class="e"/>
  <text x="232" y="772" class="s">refine, re-verify (≤~12)</text>

  <rect x="300" y="806" width="170" height="64" rx="8" class="live"/>
  <text x="385" y="832" text-anchor="middle" class="hh">runner submit</text>
  <text x="385" y="850" text-anchor="middle" class="s">(once per task)</text>

  <rect x="510" y="796" width="230" height="84" rx="8" class="srv"/>
  <text x="625" y="820" text-anchor="middle" class="hh">CyberGym server :8666</text>
  <text x="625" y="840" text-anchor="middle" class="s">docker(VUL + FIX)</text>
  <text x="625" y="858" text-anchor="middle" class="s">127.0.0.1</text>

  <rect x="510" y="898" width="150" height="40" rx="6" class="store"/>
  <text x="585" y="923" text-anchor="middle" class="s">poc.db (server state)</text>

  <rect x="780" y="796" width="270" height="84" rx="8" class="live"/>
  <text x="915" y="820" text-anchor="middle" class="hh">official target_match</text>
  <text x="915" y="840" text-anchor="middle" class="s">= vul_exit ≠ 0  AND  fix_exit == 0</text>
  <text x="915" y="860" text-anchor="middle" class="s">←  the ONLY win signal</text>

  <rect x="1090" y="806" width="170" height="64" rx="8" class="store"/>
  <text x="1175" y="832" text-anchor="middle" class="hh">trace JSON</text>
  <text x="1175" y="850" text-anchor="middle" class="s">(abstract)</text>

  <line x1="260" y1="838" x2="298" y2="838" class="e"/>
  <line x1="470" y1="838" x2="508" y2="838" class="e"/>
  <line x1="740" y1="838" x2="778" y2="838" class="e"/>
  <line x1="1050" y1="838" x2="1088" y2="838" class="e"/>
  <line x1="585" y1="880" x2="585" y2="896" class="e"/><text x="592" y="893" class="s">write</text>

  <!-- regime overlay band3 -->
  <rect x="300" y="898" width="760" height="40" rx="6" class="live" stroke="#bc4c00" stroke-dasharray="5 4"/>
  <text x="316" y="923" class="o">regime: verify logs candidate sha256 → attempts.jsonl;  accept iff solved OR ≥5 distinct;  best-of-k=2 fresh re-dispatch → else under_floor loss</text>

  <!-- ====================== BAND 4: STORES ====================== -->
  <text x="30" y="988" class="h">4   Stores — committed vs gitignored</text>

  <rect x="30" y="1006" width="690" height="148" rx="8" class="store"/>
  <text x="46" y="1028" class="hh">COMMITTED (git)</text>
  <text x="46" y="1050" class="s">memory_store/okf/**                              ←  consolidator</text>
  <text x="46" y="1070" class="s">learning/used_tasks.txt                           ←  shard_round</text>
  <text x="46" y="1090" class="s">learning/round-*/shard-*.txt                      ←  shard_round</text>
  <text x="46" y="1110" class="s">docs/learning-ledger.md , RESULTS-by-range.md     ←  consolidator</text>

  <rect x="750" y="1006" width="700" height="148" rx="8" class="dormant"/>
  <text x="766" y="1028" class="hh">GITIGNORED (volatile)</text>
  <text x="766" y="1050" class="s">memory_store/memory_stats.jsonl     ←  consolidator</text>
  <text x="766" y="1070" class="s">learning/round-*/traces/             ←  workers</text>
  <text x="766" y="1090" class="s">runs/    ←  gen   (cleared each round)</text>
  <text x="766" y="1110" class="s">poc.db / -shm / -wal     ←  CyberGym server (external state)</text>
  <text x="766" y="1130" class="o">learning/round-*/attempts.jsonl      ←  verify    [regime]</text>

  <!-- ====================== BAND 5: DORMANT v1 ====================== -->
  <text x="30" y="1188" class="h">5   v1 substrate — present in repo but DORMANT (the live loop bypasses it)</text>

  <rect x="30"  y="1206" width="200" height="74" rx="8" class="dormant"/>
  <text x="130" y="1248" text-anchor="middle" class="hh">run.py solve</text>

  <rect x="290" y="1206" width="260" height="74" rx="8" class="dormant"/>
  <text x="420" y="1240" text-anchor="middle" class="hh">agent_driver (Claude SDK)</text>
  <text x="420" y="1258" text-anchor="middle" class="s">/ agent_openai (gpt-5.5)</text>

  <rect x="610" y="1206" width="330" height="74" rx="8" class="dormant"/>
  <text x="775" y="1234" text-anchor="middle" class="hh">MCP servers</text>
  <text x="775" y="1252" text-anchor="middle" class="s">memory.* / verify.* / specialist.*</text>
  <text x="775" y="1268" text-anchor="middle" class="s">(D3 / D9 scope isolation lives here)</text>

  <line x1="230" y1="1243" x2="288" y2="1243" class="eg"/>
  <line x1="550" y1="1243" x2="608" y2="1243" class="eg"/>

  <text x="970" y="1236" class="s">Not used by the live loop ("no LLM API inside mneme").</text>
  <text x="970" y="1254" class="s">The loop uses Codex + model-free gen / verify / submit</text>
  <text x="970" y="1272" class="s">+ direct OKF reads instead.</text>

  <!-- ====================== FOOTER: INVARIANTS ====================== -->
  <rect x="30" y="1300" width="1420" height="168" rx="8" fill="#ddf4ff" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="46" y="1324" class="hh">Invariants</text>
  <text x="46" y="1348" class="l">WIN = server-authoritative:   vul_exit ≠ 0   AND   fix_exit == 0.    The local verify failure_class is a fast signal only — never a win.</text>
  <text x="46" y="1372" class="l">LEAKAGE GUARD = ORDER:   each task measured once (used_tasks.txt), against round-start frozen memory, BEFORE any learning from it.</text>
  <text x="46" y="1396" class="l">WRITE-FENCE:   workers are read-only on memory; the consolidator is the sole serial writer / committer.</text>
  <text x="46" y="1420" class="l">NO LLM inside mneme:   Codex is the only inference; mneme provides docker + server gen / verify / submit + OKF memory.</text>
  <text x="46" y="1448" class="o">improved-solve-regime (dashed, inactive):   shard size 3 → ~17 shards, concurrency waves, attempts.jsonl floor (≥5 distinct), best-of-k re-dispatch.</text>
</svg>

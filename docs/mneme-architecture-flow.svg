<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">mneme architecture flow</title>
  <desc id="desc">Current mneme architecture showing runner, Claude Agent SDK, MCP servers, isolated OKF memory, verification, specialist advisor, submit, and offline consolidation flows.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #c7cfdd; stroke-width: 1.5; rx: 12; }
      .panelSoft { fill: #f1f6ff; stroke: #b9cae8; stroke-width: 1.5; rx: 12; }
      .panelWarn { fill: #fff7e8; stroke: #e3bd73; stroke-width: 1.5; rx: 12; }
      .panelGreen { fill: #effaf4; stroke: #99c9a9; stroke-width: 1.5; rx: 12; }
      .panelRed { fill: #fff1f1; stroke: #dda2a2; stroke-width: 1.5; rx: 12; }
      .box { fill: #ffffff; stroke: #2f4058; stroke-width: 1.4; rx: 8; }
      .boxBlue { fill: #eaf2ff; stroke: #2f5f9f; stroke-width: 1.4; rx: 8; }
      .boxGreen { fill: #eaf8ef; stroke: #2e7a4d; stroke-width: 1.4; rx: 8; }
      .boxYellow { fill: #fff8e6; stroke: #9a741d; stroke-width: 1.4; rx: 8; }
      .boxRed { fill: #fff0f0; stroke: #a94a4a; stroke-width: 1.4; rx: 8; }
      .boxPurple { fill: #f2efff; stroke: #604c9b; stroke-width: 1.4; rx: 8; }
      .boxGray { fill: #f3f5f8; stroke: #5a6472; stroke-width: 1.4; rx: 8; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #172033; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 14px; fill: #5a6472; }
      .panelTitle { font-family: Inter, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #172033; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 13px; fill: #1f2a3a; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 11px; fill: #4c5868; }
      .tiny { font-family: Inter, Arial, sans-serif; font-size: 10px; fill: #5a6472; }
      .arrow { fill: none; stroke: #2f4058; stroke-width: 2; marker-end: url(#arrow); }
      .arrowData { fill: none; stroke: #2f5f9f; stroke-width: 2; marker-end: url(#arrowBlue); }
      .arrowMemory { fill: none; stroke: #2e7a4d; stroke-width: 2; marker-end: url(#arrowGreen); }
      .arrowVerify { fill: none; stroke: #9a741d; stroke-width: 2; marker-end: url(#arrowYellow); }
      .arrowSpecial { fill: none; stroke: #604c9b; stroke-width: 2; marker-end: url(#arrowPurple); }
      .arrowSubmit { fill: none; stroke: #a94a4a; stroke-width: 2; marker-end: url(#arrowRed); }
      .dash { stroke-dasharray: 8 6; }
      .boundary { fill: none; stroke: #a94a4a; stroke-width: 2; stroke-dasharray: 10 7; rx: 14; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f4058"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f5f9f"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2e7a4d"/>
    </marker>
    <marker id="arrowYellow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9a741d"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#604c9b"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#a94a4a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="980"/>
  <text class="title" x="44" y="54">mneme architecture flow</text>
  <text class="subtitle" x="44" y="78">Current repository shape: thin Python runner, Claude Agent SDK loop, MCP-scoped memory and verification, offline consolidation.</text>

  <rect class="panel" x="40" y="115" width="250" height="765"/>
  <text class="panelTitle" x="62" y="145">Inputs and CLI</text>

  <rect class="box" x="65" y="175" width="200" height="72"/>
  <text class="label" x="83" y="202">CyberGym task_dir</text>
  <text class="small" x="83" y="223">description.txt, meta.json,</text>
  <text class="small" x="83" y="239">submit.sh, seeds, recon</text>

  <rect class="boxBlue" x="65" y="285" width="200" height="86"/>
  <text class="label" x="83" y="312">runner/run.py solve</text>
  <text class="small" x="83" y="333">build task card</text>
  <text class="small" x="83" y="349">write mcp_config.json</text>
  <text class="small" x="83" y="365">launch agent / fake mode</text>

  <rect class="boxGray" x="65" y="410" width="200" height="72"/>
  <text class="label" x="83" y="438">run_dir workspace</text>
  <text class="small" x="83" y="459">task/card.md, transcript,</text>
  <text class="small" x="83" y="475">candidates, result.json</text>

  <rect class="boxYellow" x="65" y="522" width="200" height="90"/>
  <text class="label" x="83" y="548">fake mode</text>
  <text class="small" x="83" y="569">MEMONAEMO_FAKE or --fake</text>
  <text class="small" x="83" y="585">no Docker, model, network</text>
  <text class="small" x="83" y="601">synthetic candidate/verdict</text>

  <rect class="box" x="65" y="650" width="200" height="74"/>
  <text class="label" x="83" y="678">batch command</text>
  <text class="small" x="83" y="699">iterates task subdirs</text>
  <text class="small" x="83" y="715">delegates to solve()</text>

  <rect class="panelSoft" x="330" y="115" width="430" height="765"/>
  <text class="panelTitle" x="352" y="145">Agent execution surface</text>

  <rect class="boxBlue" x="360" y="175" width="170" height="88"/>
  <text class="label" x="378" y="202">task_card.py</text>
  <text class="small" x="378" y="223">classify vuln/input</text>
  <text class="small" x="378" y="239">collect seeds/recon</text>
  <text class="small" x="378" y="255">no solve-time redaction</text>

  <rect class="boxBlue" x="560" y="175" width="170" height="88"/>
  <text class="label" x="578" y="202">agent_driver.py</text>
  <text class="small" x="578" y="223">ClaudeAgentOptions</text>
  <text class="small" x="578" y="239">cwd = run_dir</text>
  <text class="small" x="578" y="255">add_dirs = skills/</text>

  <rect class="boxPurple" x="385" y="310" width="320" height="116"/>
  <text class="label" x="405" y="338">Claude Agent SDK loop</text>
  <text class="small" x="405" y="361">system prompt + kickoff</text>
  <text class="small" x="405" y="377">recon - generate - verify - repair</text>
  <text class="small" x="405" y="393">writes candidate files under run_dir</text>
  <text class="small" x="405" y="409">returns transcript, stop reason, cost</text>

  <rect class="boxGreen" x="360" y="475" width="150" height="80"/>
  <text class="label" x="378" y="502">skills/</text>
  <text class="small" x="378" y="523">agent-readable</text>
  <text class="small" x="378" y="539">tool/shared guides</text>

  <rect class="boxRed" x="555" y="475" width="175" height="80"/>
  <text class="label" x="573" y="502">D9 boundary</text>
  <text class="small" x="573" y="523">memory_store is not</text>
  <text class="small" x="573" y="539">a filesystem root</text>

  <rect class="boxGray" x="385" y="605" width="320" height="78"/>
  <text class="label" x="405" y="632">candidate output</text>
  <text class="small" x="405" y="653">expected under run_dir/candidate or candidates</text>
  <text class="small" x="405" y="669">runner writes final result.json</text>

  <rect class="panelGreen" x="800" y="115" width="265" height="765"/>
  <text class="panelTitle" x="822" y="145">MCP tool layer</text>

  <rect class="boxGreen" x="830" y="175" width="205" height="116"/>
  <text class="label" x="848" y="202">memory_server.py</text>
  <text class="small" x="848" y="224">search_okf_for_generate</text>
  <text class="small" x="848" y="240">get_repair_policy</text>
  <text class="small" x="848" y="256">get_discriminator_evidence</text>
  <text class="small" x="848" y="272">record_proposal, scope_check</text>

  <rect class="boxYellow" x="830" y="335" width="205" height="106"/>
  <text class="label" x="848" y="362">verify_server.py</text>
  <text class="small" x="848" y="384">verify.run: vul image only</text>
  <text class="small" x="848" y="400">confirm_if_available:</text>
  <text class="small" x="848" y="416">vul + fix images</text>

  <rect class="boxPurple" x="830" y="485" width="205" height="110"/>
  <text class="label" x="848" y="512">specialist_server.py</text>
  <text class="small" x="848" y="534">GPT-5.5 advisor</text>
  <text class="small" x="848" y="550">rethink reachability</text>
  <text class="small" x="848" y="566">relocalize, escape basin,</text>
  <text class="small" x="848" y="582">diversify, review</text>

  <rect class="boxGray" x="830" y="640" width="205" height="90"/>
  <text class="label" x="848" y="667">required runtime config</text>
  <text class="small" x="848" y="688">runner injects MCP env</text>
  <text class="small" x="848" y="704">RUN_CONFIG + verify_config</text>
  <text class="small" x="848" y="720">OPENAI_API_KEY optional</text>

  <rect class="panelWarn" x="1100" y="115" width="260" height="765"/>
  <text class="panelTitle" x="1122" y="145">External systems and stores</text>

  <rect class="boxGreen" x="1130" y="175" width="200" height="118"/>
  <text class="label" x="1148" y="202">memory_store/okf</text>
  <text class="small" x="1148" y="224">keyed markdown policies</text>
  <text class="small" x="1148" y="240">formats, strategies,</text>
  <text class="small" x="1148" y="256">vuln classes</text>
  <text class="small" x="1148" y="272">MCP-served only</text>

  <rect class="boxGreen" x="1130" y="320" width="200" height="74"/>
  <text class="label" x="1148" y="348">memory_stats.jsonl</text>
  <text class="small" x="1148" y="369">success, frequency,</text>
  <text class="small" x="1148" y="385">recency sidecar</text>

  <rect class="boxYellow" x="1130" y="430" width="200" height="116"/>
  <text class="label" x="1148" y="457">Docker verifier</text>
  <text class="small" x="1148" y="479">cybergym images</text>
  <text class="small" x="1148" y="495">/usr/local/bin/run_poc</text>
  <text class="small" x="1148" y="511">RuntimeVerdict or</text>
  <text class="small" x="1148" y="527">ConfirmVerdict</text>

  <rect class="boxPurple" x="1130" y="580" width="200" height="74"/>
  <text class="label" x="1148" y="608">OpenAI API</text>
  <text class="small" x="1148" y="629">specialist strategy</text>
  <text class="small" x="1148" y="645">redacted diagnosis</text>

  <rect class="boxRed" x="1130" y="690" width="200" height="88"/>
  <text class="label" x="1148" y="718">official submit</text>
  <text class="small" x="1148" y="739">submit.sh metadata</text>
  <text class="small" x="1148" y="755">curl submit-vul</text>
  <text class="small" x="1148" y="771">single submit in real mode</text>

  <rect class="panel" x="40" y="900" width="1320" height="52"/>
  <text class="small" x="62" y="923">Legend:</text>
  <line class="arrowData" x1="122" y1="919" x2="172" y2="919"/>
  <text class="tiny" x="180" y="923">runner / data flow</text>
  <line class="arrowMemory" x1="300" y1="919" x2="350" y2="919"/>
  <text class="tiny" x="358" y="923">memory scope</text>
  <line class="arrowVerify" x1="470" y1="919" x2="520" y2="919"/>
  <text class="tiny" x="528" y="923">verification</text>
  <line class="arrowSpecial" x1="640" y1="919" x2="690" y2="919"/>
  <text class="tiny" x="698" y="923">specialist</text>
  <line class="arrowSubmit" x1="805" y1="919" x2="855" y2="919"/>
  <text class="tiny" x="863" y="923">submit / promotion gate</text>
  <line class="arrow dash" x1="1035" y1="919" x2="1085" y2="919"/>
  <text class="tiny" x="1093" y="923">offline / optional path</text>

  <rect class="boundary" x="1090" y="158" width="250" height="248"/>
  <text class="tiny" x="1105" y="168">D9: not agent-readable</text>

  <path class="arrowData" d="M165 247 L165 285"/>
  <path class="arrowData" d="M265 328 C310 328 315 218 360 218"/>
  <path class="arrowData" d="M530 218 L560 218"/>
  <path class="arrowData" d="M645 263 C645 285 595 292 575 310"/>
  <path class="arrowData" d="M445 263 C445 286 485 292 515 310"/>
  <path class="arrowData" d="M545 426 L545 605"/>
  <path class="arrowData" d="M385 644 C330 644 315 446 265 446"/>
  <path class="arrowData" d="M165 371 L165 410"/>
  <path class="arrowData dash" d="M165 482 L165 522"/>
  <path class="arrowData dash" d="M165 650 L165 612"/>

  <path class="arrowMemory" d="M705 350 C760 350 770 232 830 232"/>
  <path class="arrowVerify" d="M705 374 C758 374 775 388 830 388"/>
  <path class="arrowSpecial" d="M705 400 C760 400 772 540 830 540"/>

  <path class="arrowMemory" d="M1035 218 L1130 218"/>
  <path class="arrowMemory" d="M1035 248 C1080 248 1080 357 1130 357"/>
  <path class="arrowVerify" d="M1035 388 C1084 388 1080 488 1130 488"/>
  <path class="arrowSpecial" d="M1035 540 C1080 540 1082 617 1130 617"/>

  <path class="arrowSubmit" d="M705 644 C845 644 980 734 1130 734"/>
  <path class="arrowSubmit" d="M1230 778 C1160 845 860 855 705 683"/>

  <rect class="panelRed" x="330" y="730" width="430" height="115"/>
  <text class="panelTitle" x="352" y="760">Offline consolidation and evaluation</text>
  <text class="small" x="352" y="786">consolidate command reads solved/verified result.json and split file.</text>
  <text class="small" x="352" y="806">It writes dry-run proposals outside OKF and refuses eval/unsolved/unverified runs.</text>
  <text class="small" x="352" y="826">ab_eval is train-only and dry-run by default; live mode is not implemented.</text>

  <path class="arrowSubmit dash" d="M545 683 L545 730"/>
  <path class="arrowSubmit dash" d="M760 788 C930 788 970 760 1130 734"/>

  <text class="small" x="60" y="858">Current integration caveat: tests cover structural contracts and fake mode; live Docker/model/submit path needs a real run to prove scoring behavior.</text>
</svg>
